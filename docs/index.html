<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Alexandria — Mission Control</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root {
  --bg: #0b0f14;
  --panel: #111823;
  --border: #1e2a3a;
  --accent: #00c2a8;
  --text: #e6edf3;
  --muted: #7f8c9a;
  --danger: #ff4d4d;
}

body {
  margin: 0;
  background: var(--bg);
  color: var(--text);
  font-family: ui-monospace, monospace;
}

header {
  padding: 16px 24px;
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
}

header h1 {
  margin: 0;
  font-size: 16px;
  letter-spacing: 1px;
}

.container {
  display: grid;
  grid-template-columns: 320px 1fr 320px;
  height: calc(100vh - 56px);
}

.panel {
  background: var(--panel);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
}

.panel:last-child {
  border-right: none;
}

.panel h2 {
  margin: 0;
  padding: 12px;
  font-size: 11px;
  letter-spacing: 1px;
  border-bottom: 1px solid var(--border);
  color: var(--muted);
}

.content {
  flex: 1;
  overflow: auto;
  padding: 12px;
}

.block {
  padding: 8px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
}

.block:hover {
  background: rgba(0,194,168,0.08);
}

.metric {
  margin-bottom: 12px;
  font-size: 12px;
}

.metric strong {
  display: block;
  font-size: 14px;
}

button {
  background: none;
  border: 1px solid var(--accent);
  color: var(--accent);
  padding: 6px 12px;
  cursor: pointer;
  font-family: inherit;
}

button:hover {
  background: rgba(0,194,168,0.1);
}

textarea {
  width: 100%;
  height: 100px;
  background: #0f141b;
  color: var(--text);
  border: 1px solid var(--border);
  font-family: inherit;
  font-size: 12px;
  padding: 8px;
}

pre {
  margin: 0;
  font-size: 12px;
  white-space: pre-wrap;
}
</style>
</head>

<body>

<header>
  <h1>ALEXANDRIA — HASHCHAIN CONTROL</h1>
  <div id="verifyStatus">Verification: UNKNOWN</div>
</header>

<div class="container">

  <!-- Chain -->
  <div class="panel">
    <h2>CHAIN</h2>
    <div class="content" id="chainList"></div>
  </div>

  <!-- Block Viewer -->
  <div class="panel">
    <h2>BLOCK VIEWER</h2>
    <div class="content">
      <pre id="blockView">{}</pre>
    </div>
  </div>

  <!-- Integrity -->
  <div class="panel">
    <h2>INTEGRITY</h2>
    <div class="content">

      <div class="metric">
        <strong id="chainLength">0</strong>
        Chain Length
      </div>

      <div class="metric">
        <strong id="headHash">—</strong>
        Head Hash
      </div>

      <button onclick="verifyChain()">Verify Chain</button>

      <hr style="border:0;border-top:1px solid var(--border);margin:16px 0;">

      <h2 style="border:none;padding:0;margin-bottom:8px;color:var(--muted)">EVOLVE</h2>
      <textarea id="evolveInput">{ "example": "value" }</textarea>
      <button onclick="evolveState()">Submit</button>

    </div>
  </div>

</div>

<script>
async function fetchJSON(url, options = {}) {
  const res = await fetch(url, options);
  return await res.json();
}

async function loadSnapshot() {
  const snap = await fetchJSON('/api/snapshot');
  const chain = snap.chain;

  document.getElementById('chainLength').textContent = snap.length;

  const list = document.getElementById('chainList');
  list.innerHTML = '';

  chain.forEach((block, i) => {
    const div = document.createElement('div');
    div.className = 'block';
    div.innerHTML = `
      <div>#${i}</div>
      <div style="font-size:10px;color:var(--muted)">
        ${block.hash ? block.hash.slice(0,16) : 'no hash'}
      </div>
    `;
    div.onclick = () => {
      document.getElementById('blockView').textContent =
        JSON.stringify(block, null, 2);
    };
    list.appendChild(div);
  });

  if (chain.length > 0 && chain[chain.length - 1].hash) {
    document.getElementById('headHash').textContent =
      chain[chain.length - 1].hash.slice(0,16);
  }
}

async function verifyChain() {
  const result = await fetchJSON('/api/verify');
  const status = document.getElementById('verifyStatus');

  if (result.chain_valid) {
    status.textContent = "Verification: VALID";
    status.style.color = "var(--accent)";
  } else {
    status.textContent = "Verification: BROKEN at " + result.broken_at_index;
    status.style.color = "var(--danger)";
  }
}

async function evolveState() {
  const input = document.getElementById('evolveInput').value;
  try {
    const data = JSON.parse(input);

    await fetch('/api/evolve', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ data })
    });

    await loadSnapshot();
    await verifyChain();

  } catch (e) {
    alert("Invalid JSON");
  }
}

async function init() {
  await loadSnapshot();
  await verifyChain();
}

init();
</script>

</body>
</html>
